name: Deploy To Lightsail

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      LIGHTSAIL_HOST: 13.232.115.105
      LIGHTSAIL_USER: admin
      LIGHTSAIL_APP_DIR: /home/admin/apps/stars777
      LIGHTSAIL_ENV_FILE: /etc/stars777.env

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}

      - name: Trust Lightsail host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$LIGHTSAIL_HOST" >> ~/.ssh/known_hosts

      - name: Run deployment script on Lightsail
        run: |
          ssh "$LIGHTSAIL_USER@$LIGHTSAIL_HOST" "bash -lc '
            set -euo pipefail
            cd "$LIGHTSAIL_APP_DIR"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            npm run install:all
            npm run build
            set -a
            . "$LIGHTSAIL_ENV_FILE"
            set +a
            pm2 startOrReload ecosystem.config.cjs --update-env
            pm2 save
            sudo systemctl reload nginx
          '"