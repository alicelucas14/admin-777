name: Deploy To Lightsail

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      LIGHTSAIL_HOST: 13.232.115.105
      LIGHTSAIL_USER: admin
      LIGHTSAIL_APP_DIR: /home/admin/apps/stars777
      LIGHTSAIL_ENV_FILE: /etc/stars777.env

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIGHTSAIL_SSH_PRIVATE_KEY }}

      - name: Trust Lightsail host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$LIGHTSAIL_HOST" >> ~/.ssh/known_hosts

      - name: Run deployment script on Lightsail
        run: |
          APP_DIR="$LIGHTSAIL_APP_DIR"
          ENV_FILE="$LIGHTSAIL_ENV_FILE"
          ssh "$LIGHTSAIL_USER@$LIGHTSAIL_HOST" \
            "APP_DIR='$APP_DIR' ENV_FILE='$ENV_FILE' bash '$APP_DIR/scripts/deploy-production.sh'"