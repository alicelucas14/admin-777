services:
  - type: web
    name: admin-777
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.15.0
      - key: DATA_DIR
        value: /var/data/admin-data
      - key: UPLOADS_DIR
        value: /var/data/admin-uploads
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_API_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: CONTACT_TO_EMAIL
        sync: false
      - key: CONTACT_FROM_EMAIL
        sync: false
    disk:
      name: admin-777-storage
      mountPath: /var/data
      sizeGB: 1